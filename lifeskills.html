<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goducate Sabah | Life Skills</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Goducate Sabah</a>
      <button class="menu-toggle" aria-label="Toggle menu">Menu</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html" data-page="home">Home</a>
        <a href="beginner.html" data-page="beginner">Beginner</a>
        <a href="primary1.html" data-page="primary1">Primary 1</a>
        <a href="primary2.html" data-page="primary2">Primary 2</a>
        <a href="primary3.html" data-page="primary3">Primary 3</a>
        <a href="lifeskills.html" data-page="lifeskills">Life Skills</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="lesson-header">
      <h1>Life Skills</h1>
      <p>Learning real life practical skills!</p>
    </section>

    <section>
      <div class="lesson-grid" data-level="lifeskills"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Goducate Sabah (c) 2026 | Helping needy Asians help themselves and others!</p>
    </div>
  </footer>

  <script>
    window.GODUCATE_CURRENT_PAGE = "lifeskills";
  </script>
  <script src="assets/data/lessons-data.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    (function(){
      const source = document.getElementById("lifeskills-all-lessons");
      if (source) return;

      const targets = {
        housekeeping: document.getElementById("lifeskills-housekeeping"),
        cookery: document.getElementById("lifeskills-cookery"),
        gardening: document.getElementById("lifeskills-gardening"),
        automotives: document.getElementById("lifeskills-automotives"),
        computerskills: document.getElementById("lifeskills-computerskills"),
      };
      const cards = Array.from(source.querySelectorAll(".lesson-card"));

      function titleText(card) {
        const titleEl = card.querySelectorAll("h3");
        return titleEl ? titleEl.textContent : "";
      }
      function isNumbered(title) {
        return /^\s*\d+\b/.test(String(title || ""));
      }

      function subjectKeyFromTitleFallback(title) {
        const t = String(title || "").toLowerCase();

        if (t.includes("housekeeping") || t.includes("clean") || t.includes("laundry") || t.includes("hygiene")) return "housekeeping";
        if (t.includes("cookery") || t.includes("cooking") || t.includes("cook") || t.includes("kitchen") || t.includes("food")) return "cookery";
        if (t.includes("gardening") || t.includes("garden") || t.includes("plant") || t.includes("soil") || t.includes("compost")) return "gardening";
        if (t.includes("airconditioning") || t.includes("air conditioning") || t.includes("hvac") || /\bac\b/.test(t)) return "airconditioning";
        if (t.includes("automotive") || t.includes("automotives") || t.includes("car") || t.includes("motor") || t.includes("engine")) return "automotives";
        if (t.includes("computer") || t.includes("pc") || t.includes("laptop") || t.includes("typing") || t.includes("internet")) return "computerskills";

        return "housekeeping";
      }

      const numbered = cards.some((card) => isNumbered(titleText(card)));
      if (numbered) {
        // Optional: if you organize Life Skills lessons as numbered blocks per subject,
        // this will group them by "1...n" resets in this order.
        const subjectOrder = ["housekeeping", "cookery", "gardening", "airconditioning", "automotives", "computerskills"];
        let subjectIndex = 0;
        let lastNumber = null;

        cards.forEach((card) => {
          const title = titleText(card);
          const match = String(title || "").match(/^\s*(\d+)\b/);
          const currentNumber = match ? parseInt(match[1], 10) : null;

          if (lastNumber !== null && currentNumber === 1 && lastNumber !== 1) {
            subjectIndex = Math.min(subjectIndex + 1, subjectOrder.length - 1);
          }
          if (currentNumber !== null) lastNumber = currentNumber;

          const key = subjectOrder[subjectIndex] || "housekeeping";
          const target = targets[key] || targets.housekeeping;
          if (target) target.appendChild(card);
        });
      } else {
        cards.forEach((card) => {
          const key = subjectKeyFromTitleFallback(titleText(card));
          const target = targets[key] || targets.housekeeping;
          if (target) target.appendChild(card);
        });
      }
    })();

  </script>
</body>
</html>
